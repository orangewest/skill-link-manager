<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="warmOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFC15E" />
      <stop offset="1" stop-color="#F5660A" />
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.16" r="0.95">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.40" />
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.07" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Apple-style warm-orange gradient tile (squircle) -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#warmOrange)" />
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#sheen)" />

  <!-- Connected nodes = one skill linked into many tools -->
  <g stroke="#FFFFFF" stroke-width="20" stroke-linecap="round">
    <line x1="512" y1="320" x2="344" y2="664" />
    <line x1="512" y1="320" x2="680" y2="664" />
    <line x1="344" y1="664" x2="680" y2="664" />
  </g>
  <g fill="#FFFFFF">
    <circle cx="512" cy="320" r="42" />
    <circle cx="344" cy="664" r="42" />
    <circle cx="680" cy="664" r="42" />
  </g>
</svg>
