name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos') && '-' || '' }}
        with:
          tagName: v__VERSION__
          releaseName: 'skill-link-manager v__VERSION__'
          releaseBody: '自动发布版本 ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Package portable executable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          APP_NAME="skill-link-manager"
          APP_BUNDLE="skill-link-manager.app"
          TARGET_DIR="src-tauri/target/${{ matrix.target }}/release"

          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            EXE="${APP_NAME}.exe"
            cp "$TARGET_DIR/$EXE" .
            powershell -Command "Compress-Archive -Path '$EXE' -DestinationPath '${APP_NAME}-${{ matrix.label }}.zip'"
            ASSET="${APP_NAME}-${{ matrix.label }}.zip"
          elif [ "${{ matrix.platform }}" == "macos-latest" ]; then
            BUNDLE_PATH="$TARGET_DIR/bundle/macos/$APP_BUNDLE"
            if [ ! -d "$BUNDLE_PATH" ]; then
              echo "错误：找不到 .app 包，请检查 APP_BUNDLE 是否与 productName 一致"
              exit 1
            fi
            cp -r "$BUNDLE_PATH" .
            zip -r "${APP_NAME}-${{ matrix.label }}.zip" "$APP_BUNDLE"
            ASSET="${APP_NAME}-${{ matrix.label }}.zip"
          else
            BIN="$APP_NAME"
            cp "$TARGET_DIR/$BIN" .
            tar -czf "${APP_NAME}-${{ matrix.label }}.tar.gz" "$BIN"
            ASSET="${APP_NAME}-${{ matrix.label }}.tar.gz"
          fi

          gh release upload "${{ github.ref_name }}" "$ASSET" --clobber --repo "${{ github.repository }}"